<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de Matrículas UNAMBA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <base href="/">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #64748b;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #06b6d4;
      --dark: #0f172a;
      --light: #f8fafc;
      --glass: rgba(255, 255, 255, 0.85);
      --glass-dark: rgba(15, 23, 42, 0.85);
      --border: rgba(226, 232, 240, 0.8);
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at top right, #e0e7ff, #f8fafc);
      background-attachment: fixed;
      min-height: 100vh;
      color: #1e293b;
      overflow-x: hidden;
    }

    /* Navbar Premium */
    .navbar {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 0;
      transition: all 0.3s ease;
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.5rem;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .nav-link {
      font-weight: 500;
      color: var(--secondary) !important;
      padding: 0.5rem 1.25rem !important;
      border-radius: 12px;
      margin: 0 0.25rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-link:hover {
      color: var(--primary) !important;
      background: rgba(99, 102, 241, 0.08);
      transform: translateY(-1px);
    }

    .nav-link.active {
      color: white !important;
      background: var(--primary);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    /* Global Styles */
    .btn-premium {
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
    }

    .btn-premium:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
      filter: brightness(1.1);
      color: white;
    }

    .card-premium {
      background: var(--glass);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card-premium:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    /* Hero Section */
    .hero-container {
      padding: 100px 0 60px;
      text-align: center;
    }

    .hero-title {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      color: var(--dark);
      letter-spacing: -2px;
    }

    .hero-subtitle {
      font-size: 1.25rem;
      color: var(--secondary);
      max-width: 700px;
      margin: 0 auto 3rem;
    }

    /* Sections Container */
    .content-section {
      padding: 40px 0 80px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Login Layout */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 70vh;
    }

    .login-card {
      width: 100%;
      max-width: 450px;
      padding: 2.5rem;
    }

  </style>
</head>

<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container text-center">
      <a class="navbar-brand" routerLink="/inicio">
        <i class="bi bi-mortarboard-fill me-2"></i>
        Matrículas UNAMBA
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <i class="bi bi-list"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" [class.active]="isActiveRoute('/inicio')" [routerLink]="'/inicio'">
              <i class="bi bi-house-star me-2"></i>Inicio
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [class.active]="isActiveRoute('/login-ingresante')" [routerLink]="'/login-ingresante'">
              <i class="bi bi-person-plus me-2"></i>Ingresantes
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [class.active]="isActiveRoute('/login-regular')" [routerLink]="(isLoggedIn() && isRegularStudent()) ? '/login-matricula-regular' : '/login-regular'">
              <i class="bi bi-backpack me-2"></i>Regulares
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" [class.active]="isActiveRoute('/admin')" [routerLink]="'/admin'">
              <i class="bi bi-shield-lock me-2"></i>Administración
            </a>
          </li>
          <li class="nav-item" *ngIf="currentUser">
            <a class="nav-link" (click)="logout()" style="cursor: pointer;">
              <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content with Router Outlet -->
  <main class="container">
    <router-outlet></router-outlet>
  </main>

  <!-- Modal global basado en imágenes (válido) -->
  <app-global-modal></app-global-modal>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
